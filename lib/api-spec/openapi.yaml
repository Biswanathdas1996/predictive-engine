openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Policy-Grounded Multi-Agent Prediction Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: Agent management
  - name: simulations
    description: Simulation management
  - name: posts
    description: Social simulation posts
  - name: groups
    description: Agent groups
  - name: policies
    description: Policy management
  - name: montecarlo
    description: Monte Carlo simulation engine
  - name: reports
    description: Prediction reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /status:
    get:
      operationId: getServiceStatus
      tags: [health]
      summary: Integration connection status
      description: Reports API, PostgreSQL, Neo4j, and LLM connectivity (no secrets).
      responses:
        "200":
          description: Current integration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents
      parameters:
        - name: simulationId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentBody"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Agent deleted

  /agents/{id}/neighborhood:
    get:
      operationId: getAgentNeighborhood
      tags: [agents]
      summary: Get agent neighborhood graph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent neighborhood
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentNeighborhood"

  /simulations:
    get:
      operationId: listSimulations
      tags: [simulations]
      summary: List all simulations
      responses:
        "200":
          description: List of simulations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Simulation"
    post:
      operationId: createSimulation
      tags: [simulations]
      summary: Create a new simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSimulationBody"
      responses:
        "201":
          description: Simulation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"

  /simulations/{id}:
    get:
      operationId: getSimulation
      tags: [simulations]
      summary: Get simulation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Simulation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
    delete:
      operationId: deleteSimulation
      tags: [simulations]
      summary: Delete simulation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Simulation deleted

  /simulations/{id}/config:
    patch:
      operationId: patchSimulationConfig
      tags: [simulations]
      summary: Update simulation config (e.g. selected global event IDs)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSimulationConfigBody"
      responses:
        "200":
          description: Updated simulation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "400":
          description: Invalid event IDs
        "404":
          description: Simulation not found

  /simulations/{id}/run:
    post:
      operationId: runSimulationRound
      tags: [simulations]
      summary: Run a simulation round
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Round results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationRoundResult"

  /simulations/{id}/posts:
    get:
      operationId: getSimulationPosts
      tags: [posts]
      summary: Get posts for a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /simulations/{id}/graph:
    get:
      operationId: getSimulationGraph
      tags: [simulations]
      summary: Graph view data for a simulation
      description: Agents as nodes, influences as edges, posts and comments for conversation threads.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Nodes, edges, and conversation payloads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationGraphView"

  /simulations/{id}/decode-belief-chart:
    post:
      operationId: decodeBeliefChart
      tags: [simulations]
      summary: Decode belief evolution chart via PwC GenAI
      description: >-
        Sends the chart series and simulation context to PwC GenAI and returns a short layman
        business narrative (no raw numbers required in prose).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecodeBeliefChartBody"
      responses:
        "200":
          description: Generated narrative report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecodeBeliefChartResponse"
        "503":
          description: PwC GenAI unavailable
        "502":
          description: GenAI call failed

  /policies:
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List all policies
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Policy"
    post:
      operationId: createPolicy
      tags: [policies]
      summary: Create a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyBody"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"

  /policies/{id}/attachments/{attachmentId}:
    get:
      operationId: getPolicyAttachment
      tags: [policies]
      summary: View or download original uploaded document
      description: Returns the stored bytes for a file attached when the policy was created (same filename and content as upload).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: attachmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Original file (Content-Type and Content-Disposition set from upload)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Policy or attachment not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupBody"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}:
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Group deleted
        "404":
          description: Group not found

  /groups/suggest-cohort-fields:
    post:
      operationId: suggestGroupCohortFields
      tags: [groups]
      summary: Suggest cohort form fields via GenAI
      description: >-
        Given a group name and optional notes, returns suggested description, agent count,
        and cohort spec text fields for the create-group form (PwC GenAI).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestGroupCohortFieldsBody"
      responses:
        "200":
          description: Suggested field values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestGroupCohortFieldsResponse"

  /groups/with-agents:
    post:
      operationId: createGroupWithAgents
      tags: [groups]
      summary: Create a group and LLM-generated pool agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupWithAgentsBody"
      responses:
        "201":
          description: Group and agents created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupWithAgentsResponse"

  /montecarlo/{simulationId}:
    post:
      operationId: runMonteCarlo
      tags: [montecarlo]
      summary: Run Monte Carlo simulation
      parameters:
        - name: simulationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonteCarloConfig"
      responses:
        "200":
          description: Monte Carlo results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloResult"

  /montecarlo/{simulationId}/runs:
    get:
      operationId: getMonteCarloRuns
      tags: [montecarlo]
      summary: Get Monte Carlo run history
      parameters:
        - name: simulationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monte Carlo run history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonteCarloRun"

  /reports/{simulationId}:
    get:
      operationId: getSimulationReport
      tags: [reports]
      summary: Get prediction report for a simulation
      parameters:
        - name: simulationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prediction report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionReport"

  /influences:
    post:
      operationId: createInfluence
      tags: [agents]
      summary: Create influence relationship between agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInfluenceBody"
      responses:
        "201":
          description: Influence created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Influence"

  /events:
    get:
      operationId: listEvents
      tags: [simulations]
      summary: List all events
      parameters:
        - name: simulationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [simulations]
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/suggest-from-web:
    post:
      operationId: suggestEventFromWeb
      tags: [simulations]
      summary: Draft event from live web search and PwC GenAI
      description: >-
        Runs Ollama Cloud web search (OLLAMA_API_KEY), then PwC GenAI to produce type, description,
        and impact score for the inject-event form.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestEventFromWebBody"
      responses:
        "200":
          description: Suggested event fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestEventFromWebResult"
        "503":
          description: Web search or LLM unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: object

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ServiceStatus:
      type: object
      properties:
        api:
          type: string
          enum: [ok]
        database:
          type: string
          enum: [connected, error]
        neo4j:
          type: string
          enum: [connected, disabled, error]
        llm:
          type: string
          enum: [available, unavailable]
        llmBackend:
          type: string
          nullable: true
          enum: [pwc_genai, ollama, openai_compatible]
        llmModel:
          type: string
          nullable: true
      required:
        - api
        - database
        - neo4j
        - llm
        - llmBackend
        - llmModel

    Agent:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
        region:
          type: string
        occupation:
          type: string
        persona:
          type: string
        systemPrompt:
          type: ["string", "null"]
        stance:
          type: string
        influenceScore:
          type: number
        credibilityScore:
          type: number
        beliefState:
          $ref: "#/components/schemas/BeliefState"
        confidenceLevel:
          type: number
        activityLevel:
          type: number
        groupId:
          type: ["integer", "null"]
        simulationId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - age
        - gender
        - region
        - occupation
        - persona
        - stance
        - influenceScore
        - credibilityScore
        - beliefState
        - confidenceLevel
        - activityLevel
        - createdAt

    BeliefState:
      type: object
      properties:
        policySupport:
          type: number
        trustInGovernment:
          type: number
        economicOutlook:
          type: number
      required:
        - policySupport
        - trustInGovernment
        - economicOutlook

    CreateAgentBody:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
        region:
          type: string
        occupation:
          type: string
        persona:
          type: string
        stance:
          type: string
        influenceScore:
          type: number
        credibilityScore:
          type: number
        beliefState:
          $ref: "#/components/schemas/BeliefState"
        confidenceLevel:
          type: number
        activityLevel:
          type: number
        groupId:
          type: ["integer", "null"]
        simulationId:
          type: ["integer", "null"]
      required:
        - name
        - age
        - gender
        - region
        - occupation
        - persona
        - stance

    UpdateAgentBody:
      type: object
      properties:
        name:
          type: string
        stance:
          type: string
        beliefState:
          $ref: "#/components/schemas/BeliefState"
        confidenceLevel:
          type: number
        activityLevel:
          type: number
        influenceScore:
          type: number
        credibilityScore:
          type: number

    Simulation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
        currentRound:
          type: integer
        totalAgents:
          type: integer
        totalPosts:
          type: integer
        config:
          $ref: "#/components/schemas/SimulationConfig"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - status
        - currentRound
        - totalAgents
        - totalPosts
        - config
        - createdAt

    SimulationConfig:
      type: object
      properties:
        learningRate:
          type: number
        numRounds:
          type: integer
        agentCount:
          type: integer
        policyId:
          type: ["integer", "null"]
        groupIds:
          type: ["array", "null"]
          items:
            type: integer
          description: Clone pool agents from these groups into the new simulation (ignores template agentCount).
        eventIds:
          type: array
          items:
            type: integer
          description: >-
            Global catalog event IDs (events with no simulation scope) to pass into each round's LLM prompts.
      required:
        - learningRate
        - numRounds
        - agentCount

    PatchSimulationConfigBody:
      type: object
      properties:
        eventIds:
          type: array
          items:
            type: integer
          description: Replaces config.eventIds with this list (global catalog IDs only).
      required:
        - eventIds

    CreateSimulationBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        config:
          $ref: "#/components/schemas/SimulationConfig"
      required:
        - name
        - description
        - config

    SimulationRoundResult:
      type: object
      properties:
        round:
          type: integer
        postsGenerated:
          type: integer
        beliefsUpdated:
          type: integer
        averageSentiment:
          type: number
        averagePolicySupport:
          type: number
        agentStates:
          type: array
          items:
            $ref: "#/components/schemas/AgentRoundState"
      required:
        - round
        - postsGenerated
        - beliefsUpdated
        - averageSentiment
        - averagePolicySupport
        - agentStates

    AgentRoundState:
      type: object
      properties:
        agentId:
          type: integer
        name:
          type: string
        policySupport:
          type: number
        confidenceLevel:
          type: number
        action:
          type: string
        sentiment:
          type: number
      required:
        - agentId
        - name
        - policySupport
        - confidenceLevel
        - action
        - sentiment

    Post:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        sentiment:
          type: number
        platform:
          type: string
        topicTags:
          type: array
          items:
            type: string
        round:
          type: integer
        agentId:
          type: integer
        agentName:
          type: string
        agentAge:
          type: integer
          description: Persona age (from agent record); omitted when unknown.
        agentGender:
          type: string
        agentRegion:
          type: string
        agentOccupation:
          type: string
        simulationId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - sentiment
        - platform
        - round
        - agentId
        - agentName
        - simulationId
        - createdAt

    GraphComment:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        sentiment:
          type: number
        round:
          type: integer
        agentId:
          type: integer
        agentName:
          type: string
        postId:
          type: integer
        simulationId:
          type: integer
        createdAt:
          type: string
          format: date-time
          nullable: true
        agentAge:
          type: integer
          description: Persona age from agent record
        agentGender:
          type: string
        agentRegion:
          type: string
        agentOccupation:
          type: string
      required:
        - id
        - content
        - sentiment
        - round
        - agentId
        - agentName
        - postId
        - simulationId

    SimulationGraphNode:
      type: object
      description: >-
        Agent node for the simulation graph; includes full persona and belief fields for the inspector.
      properties:
        id:
          type: integer
        name:
          type: string
        stance:
          type: string
        influenceScore:
          type: number
        policySupport:
          type: number
          description: Denormalized from beliefState.policySupport for quick display.
        confidenceLevel:
          type: number
        age:
          type: integer
        gender:
          type: string
        region:
          type: string
        occupation:
          type: string
        persona:
          type: string
        systemPrompt:
          type: ["string", "null"]
        credibilityScore:
          type: number
        activityLevel:
          type: number
        beliefState:
          $ref: "#/components/schemas/BeliefState"
        groupId:
          type: ["integer", "null"]
      required:
        - id
        - name
        - stance
        - influenceScore
        - policySupport
        - confidenceLevel
        - age
        - gender
        - region
        - occupation
        - persona
        - credibilityScore
        - activityLevel
        - beliefState

    SimulationGraphEdge:
      type: object
      properties:
        source:
          type: integer
        target:
          type: integer
        weight:
          type: number
      required:
        - source
        - target
        - weight

    SimulationGraphView:
      type: object
      properties:
        simulationId:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/SimulationGraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SimulationGraphEdge"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/GraphComment"
      required:
        - simulationId
        - nodes
        - edges
        - posts
        - comments

    PolicyAttachmentRef:
      type: object
      properties:
        id:
          type: integer
        policyId:
          type: integer
        filename:
          type: string
        contentType:
          type: string
          nullable: true
        size:
          type: integer
          description: Size in bytes
      required:
        - id
        - policyId
        - filename
        - size

    Policy:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
        attachments:
          type: array
          description: Original uploaded files (when created via multipart upload); empty for JSON-only policies
          items:
            $ref: "#/components/schemas/PolicyAttachmentRef"
      required:
        - id
        - title
        - summary
        - createdAt

    CreatePolicyBody:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
      required:
        - title
        - summary

    Group:
